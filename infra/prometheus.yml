global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "api-gateway"
    static_configs:
      - targets: ["api-gateway:8000"]

  - job_name: "inference-service"
    static_configs:
      - targets: ["inference-service:8001"]

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

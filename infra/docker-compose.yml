services:
  # ─── Redis Cache ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ml_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - ml_network

  # ─── Inference Service ────────────────────────────────────────
  inference-service:
    build:
      context: ../services/inference_service
      dockerfile: Dockerfile
    container_name: ml_inference
    environment:
      - REDIS_URL=redis://redis:6379
      - CACHE_TTL=1800
    ports:
      - "8001:8001"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - ml_network
    restart: unless-stopped

  # ─── API Gateway ──────────────────────────────────────────────
  api-gateway:
    build:
      context: ../services/api_gateway
      dockerfile: Dockerfile
    container_name: ml_gateway
    environment:
      - INFERENCE_SERVICE_URL=http://inference-service:8001
    ports:
      - "8000:8000"
    depends_on:
      inference-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - ml_network
    restart: unless-stopped

  # ─── Frontend Dashboard ───────────────────────────────────────
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: ml_frontend
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      api-gateway:
        condition: service_healthy
    networks:
      - ml_network
    restart: unless-stopped

  # ─── Prometheus ───────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: ml_prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - ml_network

  # ─── Grafana ──────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: ml_grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    networks:
      - ml_network

networks:
  ml_network:
    driver: bridge
